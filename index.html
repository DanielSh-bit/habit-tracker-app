<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LevelUp</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body>
  <main class="app">

    <header class="home-header">
      <div class="brand">
        <div class="brand-icon">🪜☁️</div>
        <div>
          <h1>LevelUp</h1>
          <p>Home Screen</p>
        </div>
      </div>
    </header>

    <section class="goals-grid">

      <article class="goal-card progress-low">
        <div class="goal-fill" style="height: 15%;"></div>
        <div class="goal-content">
          <h2>Workout</h2>
          <span>15%</span>
        </div>
      </article>

      <article class="goal-card progress-mid">
        <div class="goal-fill" style="height: 45%;"></div>
        <div class="goal-content">
          <h2>Water</h2>
          <span>45%</span>
        </div>
      </article>

      <article class="goal-card progress-high">
        <div class="goal-fill" style="height: 72%;"></div>
        <div class="goal-content">
          <h2>Sleep</h2>
          <span>72%</span>
        </div>
      </article>

    </section>

    <button class="floating-add-button">+</button>

  </main>

  <script src="script.js"></script>
</body>
</html>
