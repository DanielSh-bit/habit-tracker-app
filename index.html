<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LevelUp</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body>
  <main class="app">

    <button class="menu-button" id="openSettingsButton">☰</button>

    <section class="screen active" id="homeScreen">
      <header class="home-header">
        <div class="brand">
          <h1>LevelUp</h1>
          <p>Home Screen</p>
        </div>
      </header>

      <section class="goals-grid" id="goalsGrid"></section>

      <button class="floating-add-button" id="openAddButton">+</button>
    </section>

    <section class="screen" id="addScreen">
      <button class="back-button" data-target="homeScreen">חזרה</button>

      <h1 class="screen-title">אתגר חדש</h1>

      <form class="form-card" id="addGoalForm">
        <label>
          שם האתגר
          <input type="text" id="goalNameInput" placeholder="לדוגמה: ריצה" required>
        </label>

        <label>
          סוג אתגר
          <select id="goalTypeInput">
            <option value="yesno">כן / לא</option>
            <option value="counter">מונה</option>
            <option value="number">מספר</option>
          </select>
        </label>

        <label>
          יעד
          <input type="number" id="goalTargetInput" value="1" min="1" required>
        </label>

        <button type="submit">צור אתגר</button>
      </form>
    </section>

    <section class="screen" id="goalScreen">
      <button class="back-button" data-target="homeScreen">חזרה</button>
      <div id="goalDetails"></div>
    </section>

    <section class="screen" id="settingsScreen">
      <button class="back-button" data-target="homeScreen">חזרה</button>

      <h1 class="screen-title">הגדרות כלליות</h1>

      <div class="stats-card">
        <h2>סטטיסטיקה כוללת</h2>
        <p id="totalGoalsText"></p>
        <p id="completedGoalsText"></p>
        <p id="averageProgressText"></p>
      </div>

      <div class="stats-card">
        <h2>פודיום משפחתי</h2>
        <ol class="podium-list" id="podiumList"></ol>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
