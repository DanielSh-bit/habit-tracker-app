<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LevelUp</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body>
  <main class="app">

    <header class="home-header">
      <div class="brand">
        <h1>LevelUp</h1>
        <p>Home Screen</p>
      </div>
    </header>

    <section class="goals-grid">

      <article class="goal-card">
        <div class="goal-title">
          <h2>אימון</h2>
        </div>

        <div class="goal-status">
          <div class="flame flame-low">
            <span></span>
          </div>
          <strong>15%</strong>
        </div>
      </article>

      <article class="goal-card">
        <div class="goal-title">
          <h2>מים</h2>
        </div>

        <div class="goal-status">
          <div class="flame flame-mid">
            <span></span>
          </div>
          <strong>45%</strong>
        </div>
      </article>

      <article class="goal-card">
        <div class="goal-title">
          <h2>שינה</h2>
        </div>

        <div class="goal-status">
          <div class="flame flame-high">
            <span></span>
          </div>
          <strong>72%</strong>
        </div>
      </article>

    </section>

    <button class="floating-add-button">+</button>

  </main>

  <script src="script.js"></script>
</body>
</html>
