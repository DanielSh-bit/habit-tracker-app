<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LevelUp</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body>
  <main class="app">

    <section class="screen active" id="homeScreen">
      <button class="menu-button" id="openMenuButton">☰</button>

      <header class="home-header">
        <div class="brand">
          <h1>LevelUp</h1>
          <p>Home Screen</p>
        </div>
      </header>

      <section class="goals-grid" id="goalsGrid"></section>
    </section>

    <div class="menu-overlay" id="menuOverlay"></div>

    <aside class="side-menu" id="sideMenu">
      <nav class="side-menu-options">
        <button id="openRankingFromMenu">דירוג</button>
        <button id="openAddFromMenu">הוספת אתגר</button>
      </nav>
    </aside>

    <div class="menu-overlay" id="goalOptionsOverlay"></div>

    <aside class="side-menu" id="goalOptionsMenu">
      <nav class="side-menu-options">
        <button id="openGoalEditFromMenu">עריכת האתגר</button>
        <button id="openGoalInfoFromMenu">מידע</button>
      </nav>
    </aside>

    <section class="screen" id="addScreen">
      <button class="back-button" data-target="homeScreen">←</button>

      <h1 class="screen-title add-screen-title">אתגר חדש</h1>

      <form class="add-goal-form" id="addGoalForm">
        <div class="form-card add-goal-card">

          <label class="field-block">
            <span>שם האתגר</span>
            <input
              type="text"
              id="goalNameInput"
              class="clean-input"
              required
            >
          </label>

          <div class="field-block">
            <span>סוג האתגר</span>

            <input type="hidden" id="goalTypeInput">

            <div class="custom-select" id="goalTypePicker">
              <button type="button" class="custom-select-button" id="goalTypeButton"></button>

              <div class="custom-options" id="goalTypeOptions">
                <button type="button" data-value="yesno">כן / לא</button>
                <button type="button" data-value="counter">ספירה</button>
                <button type="button" data-value="time">זמן</button>
              </div>
            </div>
          </div>

          <div class="target-wrapper hidden" id="goalTargetWrapper">
            <label class="field-block">
              <span>יעד</span>
              <input
                type="number"
                id="goalTargetInput"
                class="clean-input"
                min="2"
                max="999"
                step="1"
                inputmode="numeric"
              >
            </label>
          </div>

        </div>

        <button type="submit" class="create-button">create</button>
      </form>
    </section>

    <section class="screen goal-screen" id="goalScreen">
      <button class="back-button" data-target="homeScreen">←</button>
      <div class="goal-details-wrapper" id="goalDetails"></div>
    </section>

    <section class="screen" id="goalSettingsScreen">
      <button class="back-button" data-target="goalScreen">←</button>

      <h1 class="screen-title">הגדרות אתגר</h1>

      <form class="form-card" id="editGoalForm">
        <label>
          שם האתגר
          <input type="text" id="editGoalNameInput" required>
        </label>

        <label>
          סוג אתגר
          <select id="editGoalTypeInput">
            <option value="yesno">כן / לא</option>
            <option value="counter">ספירה</option>
            <option value="time">זמן</option>
          </select>
        </label>

        <label>
          יעד
          <input type="number" id="editGoalTargetInput" min="1" required>
        </label>

        <button type="submit">שמור שינויים</button>
      </form>

      <button class="delete-button" id="deleteGoalButton">מחק אתגר</button>
    </section>

    <section class="screen" id="goalInfoScreen">
      <button class="back-button" data-target="goalScreen">←</button>

      <header class="goal-info-header">
        <h1 id="goalInfoTitle">מידע</h1>

        <div class="calendar-nav">
          <button type="button" id="prevMonthButton">‹</button>
          <strong id="calendarMonthTitle"></strong>
          <button type="button" id="nextMonthButton">›</button>
        </div>
      </header>

      <section class="form-card info-card">
        <div class="goal-info-stats" id="goalInfoStats"></div>
        <div class="calendar-grid" id="goalCalendarGrid"></div>
      </section>
    </section>

    <section class="screen ranking-screen" id="rankingScreen">
      <button class="back-button" data-target="homeScreen">←</button>

      <header class="ranking-header">
        <h1>דירוג</h1>
        <button id="toggleRankingSortButton">נוכחי</button>
      </header>

      <section class="ranking-list" id="rankingList"></section>
    </section>

    <section class="screen" id="nameScreen">
      <h1 class="screen-title">איך קוראים לך?</h1>

      <form class="form-card" id="nameForm">
        <label>
          שם
          <input type="text" id="playerNameInput" placeholder="לדוגמה: דניאל" required>
        </label>

        <button type="submit">המשך</button>
      </form>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
